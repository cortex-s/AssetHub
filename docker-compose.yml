services:
  mysql:
    image: mysql:latest
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: T5t8n83mNhRi # เปลี่ยนเป็นรหัสผ่านจริง
    ports:
      - "7777:3306"
    restart: unless-stopped
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio_s3
    command: server /data --console-address ":9001"
    ports:
      - "8898:9000" # S3 API
      - "8899:9001" # Web console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: dagger1bravo
    volumes:
      - ./data/minio:/data
    restart: unless-stopped
  redis:
    image: redis:latest
    container_name: redis_db
    ports:
      - "6697:6379"
    command: >
      redis-server
      --appendonly no
      --save ""
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --requirepass p32g8Xtu
    tmpfs:
      - /data:size=1g # tmpfs backed by RAM only
    restart: unless-stopped